services:
  postgres:
    image: postgres:16
    container_name: spec-sheets-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spec_sheets
      POSTGRES_USER: spec_sheets
      POSTGRES_PASSWORD: spec_sheets
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spec_sheets -d spec_sheets"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - spec_sheets_postgres_data:/var/lib/postgresql/data

volumes:
  spec_sheets_postgres_data:

