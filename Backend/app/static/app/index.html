<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spec Sheets</title>
    <script>
      (() => {
        const lastThemeUserKey = "spec-sheets.theme.last-user";
        const userThemeKeyPrefix = "spec-sheets.theme.user.";
        const defaultTheme = "dark";

        try {
          const username = window.localStorage.getItem(lastThemeUserKey);
          const storedTheme = username ? window.localStorage.getItem(`${userThemeKeyPrefix}${username}`) : null;
          const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : defaultTheme;
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Geist", "sans-serif"],
              mono: ["Geist Mono", "monospace"],
            },
            colors: {
              accent: {
                400: "#fbbf24",
                500: "#f59e0b",
                900: "#78350f",
                950: "#451a03",
              },
              zinc: {
                950: "#09090b",
                900: "#18181b",
                800: "#27272a",
                700: "#3f3f46",
                600: "#52525b",
                500: "#71717a",
                400: "#a1a1aa",
                300: "#d4d4d8",
                200: "#e4e4e7",
                100: "#f4f4f5",
                50: "#fafafa",
              },
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" crossorigin src="/static/app/assets/index-CanRBlvW.js"></script>
    <link rel="stylesheet" crossorigin href="/static/app/assets/index-AtT5VBGo.css">
  </head>

  </body>
</html>
